<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>login page</title>
    
    <link rel="stylesheet" href="login.css">
    <link href='https://fonts.googleapis.com/css?family=Kulim Park' rel='stylesheet'>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-auth-compat.js"></script>
    <script src="login.js" defer></script> 
</head>
<body>
    <header>
        <h1>Welcome to</h1>
        <h2>Mood Tracker</h2>
    </header>

    <div class="container">
        <img src="happy.png" alt="happy emoji" class="center">
        
        <h2>Let's Start!</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <div class="button-container">
            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign Up</button>
        </div>

    </div>
</body>
</html>
